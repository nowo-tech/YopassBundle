name: yopass-bundle

services:
  php:
    build: .
    volumes:
      - .:/app
      - coverage-data:/app/coverage
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /app

volumes:
  coverage-data:
