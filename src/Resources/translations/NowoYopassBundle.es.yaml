        summary: '%from%–%to% de %total%'
        page: Página %page% / %pages%
        previous: Anterior
        next: Siguiente
    status:
        active: Activo
        revoked: Revocado
        unavailable: No disponible
    link:
        label: Enlace generado (cópialo ahora, no se volverá a mostrar)
        copy: Copiar
