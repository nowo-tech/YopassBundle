    error:
        secret: Introduce un secreto o selecciona un archivo.
        secret_too_large: El secreto supera el límite de caracteres.
        file: Selecciona un archivo.
        file_too_large: El archivo supera el límite de 512 KB.
        password: Introduce una contraseña de descifrado.
        invalid_ciphertext: El ciphertext enviado no es válido.
        file_not_enabled: Los shares de archivo no están habilitados.
        create: No se pudo crear el share.
    revoked: Share revocado.
    revoke: Revocar
    revoke_confirm: ¿Revocar este share? El enlace público dejará de funcionar.
    deleted: Share eliminado.
    delete: Eliminar
    delete_confirm: ¿Eliminar permanentemente este share de tu lista? Esta acción no se puede deshacer.
    delete_all: Vaciar todo
    delete_all_confirm: ¿Eliminar permanentemente todos tus shares? Esta acción no se puede deshacer.
    deleted_all: Se eliminaron %count% share(s).
