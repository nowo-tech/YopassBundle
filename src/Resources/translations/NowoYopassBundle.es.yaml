        expiration_not_extended: Elige una extensión de expiración más larga.
        nothing_to_extend: Selecciona al menos una opción de extensión.
    expires:
        field: Caducidad
        1h: 1 hora
        24h: 24 horas
        7d: 7 días
    reads:
        field: Lecturas máx.
    create:
        title: Nuevo share
        submit: Crear enlace
    list:
        title: Mis shares
        type: Tipo
        created: Creado
        expires: Caduca
        reads: Lecturas
        status: Estado
