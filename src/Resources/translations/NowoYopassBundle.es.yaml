yopass:
    title: Yopass
    intro: Crea enlaces cifrados de un solo uso para compartir secretos de forma segura. Solo gestionas tus propios shares.
    e2e_notice: El cifrado y descifrado ocurren en tu navegador; el servidor nunca ve el texto en claro.
    back: Volver
    access:
        denied: No tienes acceso a esta herramienta.
    feature:
        denied: No tienes permiso para esta acción.
    tab:
        text: Texto
        file: Archivo
    type:
        text: Texto
        file: Archivo
    secret:
        field: Secreto
        placeholder: Introduce el secreto a compartir…
        help: Se permiten saltos de línea. Máx. %limit% caracteres.
        counter: '__COUNT__ / __LIMIT__ caracteres'
        limit_reached: Has alcanzado el límite de caracteres. Elimina texto para continuar.
    file:
        field: Archivo
        help: Máx. 512 KB. Cifrado en el navegador antes de subir.
    key:
        generate: Generar clave de descifrado automáticamente
        mode_auto: Clave generada automáticamente
        mode_password: Contraseña personalizada
        mode_help: Elige una clave aleatoria o una contraseña que compartirás aparte.
        mode_field: Modo de cifrado
        custom: Contraseña de descifrado
        custom_help: Comparte el enlace y esta contraseña por canales distintos.
        embed_in_url: Incluir clave/contraseña en la URL (?decrypt_key=)
        embed_help: La clave viaja como parámetro ?decrypt_key= en el enlace one-click.
        separate_label: Clave / contraseña (compartir por separado)
        separate_help: Envía el enlace por un canal y la clave por otro (Signal, SMS…).
    result:
        title: Secreto almacenado de forma segura
        remember: Recuerda
        remember_text: El secreto solo puede descargarse el número de veces configurado. No abras tú el enlace one-click. Lo más prudente es enviar la clave de descifrado por un canal distinto.
        one_click: Enlace directo (one-click)
        one_click_help: Comparte este enlace para acceder directamente al secreto.
        short: Enlace corto
        short_help: Requiere compartir la clave de descifrado por separado.
        decryption_key: Clave de descifrado
        decryption_key_help: Necesaria para descifrar el mensaje con el enlace corto.
        key_unavailable: La clave de descifrado ya no está disponible. Copia los enlaces justo después de crear el share.
