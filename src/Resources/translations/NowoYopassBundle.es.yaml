        reveal: Revelar secreto
        unavailable: Este enlace ya no está disponible (caducado, revocado o consumido).
        password_field: Contraseña de descifrado
        key_required: Introduce la clave de descifrado.
        password_required: Introduce la contraseña de descifrado.
        password_from_link: Contraseña cargada desde el enlace.
        key_field: Clave de descifrado
        key_help: Pega la clave que recibiste por separado (enlace corto sin ?decrypt_key=).
        key_from_link: Clave cargada desde el enlace.
        invalid_key: Clave o contraseña incorrecta.
