# CI: tests on PHP 8.2–8.5 × Symfony 7.0, 7.4, 8.0, 8.1 (exclusions for incompatible pairs).
# Coverage with PCOV; release updated via release.yml on tag push.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: PHP ${{ matrix.php }} - Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest
    env:
      COMPOSER_IGNORE_PLATFORM_REQ: ext-mongodb

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['7.0', '7.4', '8.0', '8.1']
        exclude:
          - php: '8.2'
            symfony: '8.0'
          - php: '8.2'
            symfony: '8.1'
          - php: '8.3'
            symfony: '8.0'
          - php: '8.3'
            symfony: '8.1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, sodium
          coverage: pcov
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies with Symfony ${{ matrix.symfony }}
        run: |
          SYMFONY="${{ matrix.symfony }}"
          SYMFONY_MAJOR="${SYMFONY%%.*}"
          if [ "$SYMFONY_MAJOR" -ge 8 ]; then
            DOCTRINE_BUNDLE="^3.0"
          else
            DOCTRINE_BUNDLE="^2.10"
          fi
          echo "Using doctrine/doctrine-bundle ${DOCTRINE_BUNDLE} with Symfony ^${SYMFONY}"
          composer require \
            symfony/config:^${SYMFONY} \
            symfony/dependency-injection:^${SYMFONY} \
            symfony/form:^${SYMFONY} \
            symfony/framework-bundle:^${SYMFONY} \
            symfony/http-kernel:^${SYMFONY} \
            symfony/routing:^${SYMFONY} \
            symfony/security-bundle:^${SYMFONY} \
            symfony/translation:^${SYMFONY} \
            symfony/twig-bundle:^${SYMFONY} \
            symfony/validator:^${SYMFONY} \
            symfony/yaml:^${SYMFONY} \
            doctrine/doctrine-bundle:${DOCTRINE_BUNDLE} \
            --no-interaction --no-update
          composer update symfony/* doctrine/* --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: |
          echo "🧪 Running tests on PHP ${{ matrix.php }} with Symfony ${{ matrix.symfony }}..."
          composer test
          if [ $? -ne 0 ]; then
            echo "❌ ERROR: Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed successfully"

      - name: Run tests with coverage (PHP 8.2 + Symfony 7.0 only)
        if: matrix.php == '8.2' && matrix.symfony == '7.0'
        run: |
          echo "📊 Generating coverage report..."
          composer test-coverage
          if [ $? -ne 0 ]; then
            echo "❌ ERROR: Tests failed when generating coverage"
            exit 1
          fi
          echo "✅ Coverage generated"

  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    env:
      COMPOSER_IGNORE_PLATFORM_REQ: ext-mongodb
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2, cs2pr

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Fix code style
        run: composer cs-fix

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Apply PHP CS Fixer fixes [skip ci]"
          git push

  code-style-check:
    name: Code Style Check
    runs-on: ubuntu-latest
    env:
      COMPOSER_IGNORE_PLATFORM_REQ: ext-mongodb
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2, cs2pr

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check code style
        run: composer cs-check

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      COMPOSER_IGNORE_PLATFORM_REQ: ext-mongodb

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: json, sodium
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies (Symfony 7.0)
        run: |
          composer require symfony/config:^7.0 symfony/dependency-injection:^7.0 symfony/form:^7.0 symfony/framework-bundle:^7.0 symfony/http-foundation:^7.0 symfony/http-kernel:^7.0 symfony/routing:^7.0 symfony/twig-bundle:^7.0 symfony/web-profiler-bundle:^7.0 doctrine/doctrine-bundle:^2.10 --no-interaction --no-update
          composer update symfony/* doctrine/* --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run tests with coverage
        run: |
          echo "🧪 Running tests with coverage..."
          rm -rf .phpunit.cache
          composer test-coverage
          if [ $? -ne 0 ]; then
            echo "❌ ERROR: Tests failed"
            exit 1
          fi
          echo "✅ All tests passed successfully"

      - name: Validate coverage file
        run: |
          if [ ! -f coverage.xml ]; then
            echo "ERROR: coverage.xml was not generated"
            exit 1
          fi
          echo "✅ coverage.xml generated"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    env:
      COMPOSER_IGNORE_PLATFORM_REQ: ext-mongodb

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: json, sodium
          tools: composer:v2

      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: composer phpstan

  typescript:
    name: Vitest (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm install -g pnpm@10
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage

  security-audit:
    name: Composer audit
    runs-on: ubuntu-latest
    env:
      COMPOSER_IGNORE_PLATFORM_REQ: ext-mongodb

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - run: composer install --prefer-dist --no-progress --no-interaction
      - run: composer audit

  git-hygiene:
    name: Git hygiene (REQ-GIT-001)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for Cursor co-author trailers
        run: |
          chmod +x .scripts/check-no-cursor-coauthor.sh
          ./.scripts/check-no-cursor-coauthor.sh HEAD
